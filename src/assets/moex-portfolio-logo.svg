<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" shape-rendering="geometricPrecision">
	<defs>
		<!-- Dark-to-vibrant color gradient -->
		<linearGradient id="candleGradient" x1="0%" y1="100%" x2="100%" y2="0%">
			<stop offset="0%" stop-color="#1447E6"/>
			<stop offset="60%" stop-color="#2563EB"/>
			<stop offset="100%" stop-color="#4F46E5"/>
		</linearGradient>
	</defs>

	<!-- Balanced and Centered Group for the Proportional MOEX Staircase (Transparent Background) -->
	<g transform="translate(14, 34)">
		<!-- === STEP 1 LEVEL (First 2 Shorter Candles - Height: 30px) === -->
		<rect x="0" y="30" width="14" height="30" rx="4" fill="url(#candleGradient)"/>
		<rect x="21" y="30" width="14" height="30" rx="4" fill="url(#candleGradient)"/>

		<!-- === STEP 2 LEVEL (Last 3 Taller Candles - Exactly 2x Step 1 Proportions - Height: 60px) === -->
		<rect x="42" y="0" width="14" height="60" rx="4" fill="url(#candleGradient)"/>
		<rect x="63" y="0" width="14" height="60" rx="4" fill="url(#candleGradient)"/>
		<rect x="84" y="0" width="14" height="60" rx="4" fill="url(#candleGradient)"/>
	</g>
</svg>
